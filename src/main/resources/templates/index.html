<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HowDoWeDo</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand bg-body-tertiary border-bottom">
    <div class="container">
        <span class="navbar-brand mb-0 h1">HowDoWeDo</span>
        <div class="d-flex align-items-center gap-3">
            <a sec:authorize="hasRole('ADMINISTRATOR')" th:href="@{/admin/users}">User administration</a>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-secondary btn-sm" type="submit">Sign out</button>
            </form>
        </div>
    </div>
</nav>
<div class="container py-5">
    <h1 class="h3">Welcome, <span th:text="${displayName}">there</span>!</h1>
    <p class="text-muted">You are signed in. Survey management will appear here.</p>
</div>
</body>
</html>
