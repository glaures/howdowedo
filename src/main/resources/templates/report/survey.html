<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{report.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>
<div class="container py-4">
    <a class="small" th:href="@{'/surveys/' + ${survey.id}}" th:text="#{results.backToSurvey}">&larr; Survey</a>
    <h1 class="h4 mt-1 mb-1" th:text="${survey.title}">Survey</h1>

    <!-- Segmentation selector: only when the survey has at least one single-choice question -->
    <form th:if="${!segmentOptions.isEmpty()}" method="get"
          th:action="@{'/surveys/' + ${survey.id} + '/report'}" class="row g-2 align-items-center my-3">
        <div class="col-auto">
            <label class="col-form-label small" for="segmentBy" th:text="#{report.segmentBy}">Segment by</label>
        </div>
        <div class="col-auto">
            <!-- Changing the question resets the value filter to the side-by-side comparison. -->
            <select class="form-select form-select-sm" id="segmentBy" name="segmentBy"
                    onchange="var v=document.getElementById('segmentValue'); if(v){v.value='';} this.form.submit()">
                <option value="" th:text="#{report.segment.none}">No segmentation</option>
                <option th:each="o : ${segmentOptions}" th:value="${o.questionId}"
                        th:selected="${segmentBy != null and segmentBy == o.questionId}"
                        th:text="${o.text}">Question</option>
            </select>
        </div>
        <!-- Value filter: once a question is chosen, optionally show only one of its segments. -->
        <div class="col-auto" th:if="${segmentValues != null and !segmentValues.isEmpty()}">
            <label class="col-form-label small" for="segmentValue" th:text="#{report.filterValue}">Show only</label>
        </div>
        <div class="col-auto" th:if="${segmentValues != null and !segmentValues.isEmpty()}">
            <select class="form-select form-select-sm" id="segmentValue" name="segmentValue"
                    onchange="this.form.submit()">
                <option value="" th:text="#{report.segment.allCompare}">All (compare)</option>
                <option th:each="v : ${segmentValues}" th:value="${v}"
                        th:selected="${segmentValue != null and segmentValue == v}"
                        th:text="${v}">Value</option>
            </select>
        </div>
    </form>

    <!-- ===================== Overall report (optionally filtered to one segment) ===================== -->
    <div th:if="${report != null}">
        <p class="text-muted mb-1">
            <span th:text="#{results.responseCount(${report.responseCount})}">0 responses</span>
            <th:block th:if="${segmentValue != null}">
                &middot;
                <span th:text="#{report.filteredTo(${segmentValue})}">filtered</span>
            </th:block>
        </p>

        <section th:each="section : ${report.sections}" class="mb-4">
            <h2 class="h5 mb-2" th:text="${section.title}">Section</h2>
            <div class="card mb-3" th:each="q : ${section.questions}">
                <div class="card-body">
                    <div class="row align-items-center g-3">
                        <div class="col-md-5">
                            <div class="fw-semibold" th:text="${q.text}">Question</div>
                            <span class="badge text-bg-light" th:text="#{'questiontype.' + ${q.type}}">TYPE</span>
                        </div>
                        <div class="col-md-7">
                            <div th:replace="~{fragments/report :: viz(${q})}"></div>
                        </div>
                    </div>
                    <div th:replace="~{fragments/report :: comments(${q})}"></div>
                </div>
            </div>
        </section>
    </div>

    <!-- ===================== Segmented report (comparison per question) ===================== -->
    <div th:if="${segmented != null}">
        <p class="text-muted mb-1">
            <span th:text="#{results.responseCount(${segmented.responseCount})}">0 responses</span>
            &middot;
            <span th:text="#{report.segmentedBy(${segmented.segmentedBy.text})}">segmented by X</span>
        </p>
        <p th:if="${!segmented.suppressedLabels.isEmpty()}" class="small text-muted">
            <span th:text="#{report.segment.suppressed}">Hidden (too few responses):</span>
            <th:block th:each="label,it : ${segmented.suppressedLabels}"
            ><span th:text="${label != ''} ? ${label} : #{report.segment.noAnswer}">label</span
            ><span th:if="${!it.last}">, </span></th:block>
        </p>

        <p th:if="${segmented.segments.isEmpty()}" class="alert alert-warning"
           th:text="#{report.segment.allSuppressed}">No segment has enough responses.</p>

        <section th:each="section : ${segmented.sections}" class="mb-4"
                 th:unless="${segmented.segments.isEmpty()}">
            <h2 class="h5 mb-2" th:text="${section.title}">Section</h2>
            <div class="card mb-3" th:each="q : ${section.questions}">
                <div class="card-body">
                    <div class="fw-semibold" th:text="${q.text}">Question</div>
                    <span class="badge text-bg-light mb-2" th:text="#{'questiontype.' + ${q.type}}">TYPE</span>

                    <!-- One column per segment, lined up for comparison -->
                    <div class="row g-3 mt-1">
                        <div class="col-md-6" th:each="cell : ${q.cells}">
                            <div class="small fw-semibold mb-1">
                                <span th:text="${cell.label != ''} ? ${cell.label} : #{report.segment.noAnswer}">Segment</span>
                                <span class="text-muted" th:text="'(' + ${cell.responseCount} + ')'">(0)</span>
                            </div>
                            <div th:replace="~{fragments/report :: viz(${cell.report})}"></div>
                            <div th:replace="~{fragments/report :: comments(${cell.report})}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
