<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{results.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>
<div class="container py-4">
    <a class="small" th:href="@{'/surveys/' + ${survey.id}}" th:text="#{results.backToSurvey}">&larr; Survey</a>
    <h1 class="h4 mt-1 mb-1" th:text="${results.title}">Survey</h1>
    <p class="text-muted" th:text="#{results.responseCount(${results.responseCount})}">0 responses</p>

    <div class="card mb-3" th:each="question : ${results.questions}">
        <div class="card-body">
            <div class="fw-semibold" th:text="${question.text}">Question</div>
            <span class="badge text-bg-light mb-2" th:text="#{'questiontype.' + ${question.type}}">TYPE</span>

            <!-- Choice / scale: tally per option -->
            <ul class="list-group" th:if="${question.type.name() != 'TEXT'}">
                <li class="list-group-item d-flex justify-content-between"
                    th:each="option : ${question.optionCounts}">
                    <span th:text="${option.key}">Option</span>
                    <span class="badge text-bg-secondary" th:text="${option.value}">0</span>
                </li>
            </ul>

            <!-- Free text: list the anonymous answers -->
            <ul class="list-group" th:if="${question.type.name() == 'TEXT'}">
                <li class="list-group-item" th:each="answer : ${question.textAnswers}" th:text="${answer}">Answer</li>
                <li class="list-group-item text-muted" th:if="${question.textAnswers.isEmpty()}"
                    th:text="#{results.noAnswers}">No answers yet.</li>
            </ul>

            <!-- Anonymous free-text comments -->
            <div th:if="${!question.comments.isEmpty()}" class="mt-3">
                <div class="small text-muted text-uppercase mb-1" th:text="#{results.comments}">Comments</div>
                <ul class="list-group">
                    <li class="list-group-item" th:each="comment : ${question.comments}"
                        th:text="${comment}">Comment</li>
                </ul>
            </div>
        </div>
    </div>
</div>
</body>
</html>
