<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{users.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>
<div class="container py-4">
    <h1 class="h4 mb-3" th:text="#{users.heading}">Users</h1>
    <table class="table align-middle">
        <thead>
        <tr>
            <th th:text="#{users.col.name}">Name</th>
            <th th:text="#{users.col.email}">Email</th>
            <th th:text="#{users.col.roles}">Roles</th>
            <th class="text-end" th:text="#{users.col.save}">Save</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <form th:action="@{'/admin/users/' + ${user.id} + '/roles'}" method="post">
                <td th:text="${user.name}">Name</td>
                <td th:text="${user.email}">email</td>
                <td>
                    <div class="form-check form-check-inline" th:each="role : ${allRoles}">
                        <input class="form-check-input" type="checkbox" name="roles"
                               th:id="${'r-' + user.id + '-' + role}"
                               th:value="${role}"
                               th:checked="${user.roles.contains(role)}"
                               th:disabled="${role.name() == 'USER'}">
                        <label class="form-check-label" th:for="${'r-' + user.id + '-' + role}"
                               th:text="#{'role.' + ${role}}">ROLE</label>
                    </div>
                </td>
                <td class="text-end">
                    <button class="btn btn-sm btn-primary" type="submit" th:text="#{users.save}">Save</button>
                </td>
            </form>
        </tr>
        </tbody>
    </table>
    <p class="text-muted small" th:utext="#{users.userRoleNote}">The <strong>User</strong> role is granted to everyone and cannot be removed.</p>
</div>
</body>
</html>
