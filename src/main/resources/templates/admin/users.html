<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User administration &middot; HowDoWeDo</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">HowDoWeDo</a>
        <span class="navbar-text">User administration</span>
    </div>
</nav>
<div class="container py-4">
    <h1 class="h4 mb-3">Users</h1>
    <table class="table align-middle">
        <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Roles</th>
            <th class="text-end">Save</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <form th:action="@{'/admin/users/' + ${user.id} + '/roles'}" method="post">
                <td th:text="${user.name}">Name</td>
                <td th:text="${user.email}">email</td>
                <td>
                    <div class="form-check form-check-inline" th:each="role : ${allRoles}">
                        <input class="form-check-input" type="checkbox" name="roles"
                               th:id="${'r-' + user.id + '-' + role}"
                               th:value="${role}"
                               th:checked="${user.roles.contains(role)}"
                               th:disabled="${role.name() == 'USER'}">
                        <label class="form-check-label" th:for="${'r-' + user.id + '-' + role}"
                               th:text="${role}">ROLE</label>
                    </div>
                </td>
                <td class="text-end">
                    <button class="btn btn-sm btn-primary" type="submit">Save</button>
                </td>
            </form>
        </tr>
        </tbody>
    </table>
    <p class="text-muted small">The <strong>User</strong> role is granted to everyone and cannot be removed.</p>
</div>
</body>
</html>
