<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in &middot; HowDoWeDo</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm mt-5">
                <div class="card-body p-4">
                    <h1 class="h4 text-center mb-1">HowDoWeDo</h1>
                    <p class="text-muted text-center mb-4">Sign in to continue</p>

                    <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
                        You have been signed out.
                    </div>
                    <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                        Sign in failed. Please try again.
                    </div>

                    <div class="d-grid gap-2">
                        <a th:each="provider : ${providers}"
                           th:href="@{${provider.authorizationUrl}}"
                           class="btn btn-outline-primary btn-lg">
                            Continue with <span th:text="${provider.displayName}">Provider</span>
                        </a>
                    </div>

                    <p th:if="${providers.isEmpty()}" class="text-danger text-center mb-0">
                        No identity providers are configured.
                    </p>
                </div>
            </div>
            <p class="text-center text-muted mt-3 small">Employee surveys, done right.</p>
        </div>
    </div>
</div>
</body>
</html>
