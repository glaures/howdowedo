<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{login.title})}"></head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm mt-5">
                <div class="card-body p-4">
                    <h1 class="text-center mb-1">
                        <img th:src="@{/logo.png}" th:alt="#{login.heading}" class="img-fluid"
                             style="max-height: 52px">
                    </h1>
                    <p class="text-muted text-center mb-4" th:text="#{login.subtitle}">Sign in to continue</p>

                    <div th:if="${param.logout}" class="alert alert-success py-2" role="alert"
                         th:text="#{login.signedOut}">
                        You have been signed out.
                    </div>
                    <div th:if="${param.error}" class="alert alert-danger py-2" role="alert"
                         th:text="#{login.failed}">
                        Sign in failed. Please try again.
                    </div>

                    <div class="d-grid gap-2">
                        <a th:each="provider : ${providers}"
                           th:href="@{${provider.authorizationUrl}}"
                           class="btn btn-outline-primary btn-lg"
                           th:text="#{login.continueWith(${provider.displayName})}">
                            Continue with Provider
                        </a>
                    </div>

                    <p th:if="${providers.isEmpty()}" class="text-danger text-center mb-0"
                       th:text="#{login.noProviders}">
                        No identity providers are configured.
                    </p>
                </div>
            </div>
            <p class="text-center text-muted mt-3 small" th:text="#{app.tagline}">Employee surveys, done right.</p>
            <p class="text-center text-muted small">
                <a th:href="@{/login(lang='en')}">EN</a> | <a th:href="@{/login(lang='de')}">DE</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
