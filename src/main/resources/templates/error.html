<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{error.title})}"></head>
<body class="bg-light">
<div class="container py-5 text-center">
    <h1 class="display-6" th:text="#{error.heading}">Something went wrong</h1>
    <p class="text-muted" th:text="${message} ?: #{error.unexpected}">Unexpected error.</p>
    <a th:href="@{/}" class="btn btn-primary mt-3" th:text="#{error.backToStart}">Back to start</a>
</div>
</body>
</html>
