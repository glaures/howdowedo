<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!--
  Shared layout fragments:
  - head(title): common <head> incl. Bootstrap CSS + JS bundle (needed for the menu dropdowns)
  - navbar:      role-based navigation menu (Administration / Surveys) + language switcher + sign out
-->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">HowDoWeDo</title>
    <link rel="icon" th:href="@{/favicon.ico}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script defer
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<!-- Inline error banner for redirected business/validation errors (flash attribute). -->
<div th:fragment="flash" th:if="${errorMessage}" class="container mt-3">
    <div class="alert alert-danger mb-0" role="alert" th:text="${errorMessage}"></div>
</div>
<nav th:fragment="navbar" class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand py-0" th:href="@{/}">
            <img th:src="@{/logo.png}" th:alt="#{app.name}" height="32">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <!-- Surveys is reachable by anyone: the list shows whatever was shared with the user. -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/surveys}" th:text="#{nav.surveys}">Surveys</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('SURVEY_MANAGER')">
                    <a class="nav-link" th:href="@{/scales}" th:text="#{nav.scales}">Scales</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMINISTRATOR')">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false"
                       th:text="#{nav.administration}">Administration</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/admin/users}"
                               th:text="#{nav.userAdministration}">User administration</a></li>
                    </ul>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <span class="small text-muted">
                    <a th:href="@{${currentPath}(lang='en')}">EN</a> |
                    <a th:href="@{${currentPath}(lang='de')}">DE</a>
                </span>
                <form th:action="@{/logout}" method="post" class="d-flex">
                    <button class="btn btn-outline-secondary btn-sm" type="submit"
                            th:text="#{nav.signOut}">Sign out</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
