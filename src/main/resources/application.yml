spring:
  application:
    name: howdowedo
  # Internationalisation: English is the default; German is provided via messages_de.properties.
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  # Cache static assets in the browser so the logo/CSS are not re-fetched on every page navigation.
  # CSS/JS get a content hash in their URL (via @{...}) so a changed file busts the cache
  # automatically; the logo keeps its plain path (it is on a security-permitted path) and relies on
  # the max-age below.
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 30d
          cache-public: true
      chain:
        strategy:
          content:
            enabled: true
            paths: /css/**, /js/**
  # Persist HTTP sessions in the database so a logged-in user stays signed in across application
  # restarts. The schema scripts are idempotent (see resources/session), so `always` is safe to
  # run on every startup; @@platform@@ resolves to mysql (production) or h2 (tests).
  session:
    jdbc:
      initialize-schema: always
      schema: classpath:session/schema-@@platform@@.sql
  # Load secrets from the local .env (KEY=VALUE), then the OAuth2 provider registrations.
  # The .env file is optional so the app also starts from real environment variables.
  config:
    import:
      - optional:file:.env[.properties]
      - classpath:application-security.yml
      - classpath:application-persistence.yml
      - classpath:application-mail.yml

# Public base URL used to build survey response links in invitation emails.
app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  mail:
    from: ${MAIL_FROM:no-reply@howdowedo.local}
  seed:
    # When true, SurveySeeder creates a survey from the seed file on startup (idempotent). The seed
    # file is optional and not part of the repository; if it is missing the seeder does nothing.
    survey: ${SEED_SURVEY:false}
    survey-file: ${SEED_SURVEY_FILE:seed/seed-survey.tsv}
    # Dev aid: fill surveys with anonymous sample responses so the reports can be tried out. Without a
    # survey-id it targets every survey that has questions but no responses yet (idempotent on restart).
    sample-responses:
      enabled: ${SEED_SAMPLE_RESPONSES:false}
      count: ${SEED_SAMPLE_RESPONSES_COUNT:40}
      survey-id: ${SEED_SAMPLE_RESPONSES_SURVEY_ID:}

server:
  # Defaults to 8081 for local testing; override with SERVER_PORT in other environments.
  port: ${SERVER_PORT:8081}
  # Behind a TLS-terminating reverse proxy, honour X-Forwarded-* so OAuth2 redirect URIs and the
  # invitation links use the external https URL. Set FORWARD_HEADERS_STRATEGY=framework in production.
  forward-headers-strategy: ${FORWARD_HEADERS_STRATEGY:none}
  servlet:
    session:
      # Keep users signed in for a long time so they don't have to re-authenticate constantly.
      timeout: ${SESSION_TIMEOUT:30d}
      cookie:
        # max-age makes the session cookie persistent (survives closing the browser); without it the
        # cookie is cleared on close. same-site=lax keeps it working with the OAuth2 login redirect.
        max-age: ${SESSION_COOKIE_MAX_AGE:30d}
        http-only: true
        same-site: lax
        # Send the session cookie only over HTTPS. Set SESSION_COOKIE_SECURE=true in production.
        secure: ${SESSION_COOKIE_SECURE:false}
