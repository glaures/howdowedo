services:
  app:
    build: .
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      # Reach the other compose services by name, regardless of .env (which targets local dev).
      SERVER_PORT: 8081
      MYSQL_HOST: db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-howdowedo}
      MYSQL_USER: ${MYSQL_USER:-howdowedo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-howdowedo}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
